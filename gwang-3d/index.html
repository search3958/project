<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shader Studio - Web 3D Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-tertiary: #1a1a25;
      --border: #2a2a3a;
      --text-primary: #e8e8f0;
      --text-secondary: #8888a0;
      --accent: #00d4aa;
      --accent-dim: #00a080;
      --warning: #ffaa00;
      --danger: #ff4466;
    }
    
    * { box-sizing: border-box; }
    
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      margin: 0;
      overflow: hidden;
    }
    
    .mono { font-family: 'JetBrains Mono', monospace; }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }
    
    .panel {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
    }
    
    .panel-header {
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }
    
    .btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
      font-size: 12px;
    }
    
    .btn:hover {
      background: var(--border);
      border-color: var(--accent-dim);
    }
    
    .btn-accent {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg-primary);
      font-weight: 600;
    }
    
    .btn-accent:hover {
      background: var(--accent-dim);
      border-color: var(--accent-dim);
    }
    
    .input-field {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 6px 10px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      width: 100%;
    }
    
    .input-field:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .slider-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    input[type="range"] {
      -webkit-appearance: none;
      background: var(--bg-primary);
      border-radius: 4px;
      height: 6px;
      flex: 1;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }
    
    input[type="color"] {
      -webkit-appearance: none;
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
    }
    
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
    input[type="color"]::-webkit-color-swatch { border-radius: 2px; border: none; }
    
    .object-item {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.1s ease;
    }
    
    .object-item:hover { background: var(--bg-tertiary); }
    .object-item.selected { background: var(--accent-dim); color: var(--text-primary); }
    
    .object-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .property-row {
      display: flex;
      align-items: center;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    
    .property-label {
      width: 70px;
      font-size: 11px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    
    .property-value {
      flex: 1;
      display: flex;
      gap: 6px;
    }
    
    .axis-input {
      width: 50px;
      text-align: center;
    }
    
    .axis-x { border-left: 3px solid #ff4466; }
    .axis-y { border-left: 3px solid #44ff66; }
    .axis-z { border-left: 3px solid #4488ff; }
    
    .material-btn {
      padding: 6px 10px;
      font-size: 10px;
      flex: 1;
    }
    
    .material-btn.active {
      background: var(--accent);
      color: var(--bg-primary);
      border-color: var(--accent);
    }
    
    #viewport {
      position: absolute;
      top: 0;
      left: 240px;
      right: 280px;
      bottom: 40px;
    }
    
    .dropdown {
      position: relative;
    }
    
    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 4px;
      min-width: 140px;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    
    .dropdown:hover .dropdown-content { display: block; }
    
    .dropdown-item {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.1s;
    }
    
    .dropdown-item:hover { background: var(--border); }
    
    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: var(--bg-tertiary);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 20px;
      font-size: 11px;
      color: var(--text-secondary);
    }
    
    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .viewport-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: 
        linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px),
        linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    .tooltip {
      position: relative;
    }
    
    .tooltip::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-primary);
      border: 1px solid var(--border);
      padding: 4px 8px;
      font-size: 10px;
      white-space: nowrap;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    
    .tooltip:hover::after { opacity: 1; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .recording { animation: pulse 1s infinite; }
  </style>
</head>
<body>
  <!-- Left Panel - Scene Hierarchy -->
  <div class="panel fixed top-0 left-0 bottom-10 w-60 flex flex-col z-10">
    <div class="panel-header flex items-center justify-between">
      <span>Scene Hierarchy</span>
      <div class="dropdown">
        <button class="btn btn-accent text-xs py-1 px-3">+ Add</button>
        <div class="dropdown-content">
          <div class="dropdown-item" onclick="addObject('box')">Box</div>
          <div class="dropdown-item" onclick="addObject('cylinder')">Cylinder</div>
          <div class="dropdown-item" onclick="addObject('sphere')">Sphere</div>
          <div class="dropdown-item" onclick="addObject('plane')">Plane</div>
          <div class="dropdown-item" onclick="addObject('text')">Text</div>
          <div style="border-top: 1px solid var(--border); margin: 4px 0;"></div>
          <div class="dropdown-item" onclick="addLight('point')">Point Light</div>
          <div class="dropdown-item" onclick="addLight('directional')">Sun Light</div>
          <div class="dropdown-item" onclick="addLight('spot')">Spot Light</div>
        </div>
      </div>
    </div>
    <div id="objectList" class="flex-1 overflow-y-auto"></div>
  </div>

  <!-- Right Panel - Properties -->
  <div class="panel fixed top-0 right-0 bottom-10 w-70 flex flex-col z-10">
    <div class="panel-header">Properties</div>
    <div id="propertiesPanel" class="flex-1 overflow-y-auto">
      <div class="p-4 text-center text-sm" style="color: var(--text-secondary);">
        Select an object to edit
      </div>
    </div>
  </div>

  <!-- Top Toolbar -->
  <div class="fixed top-0 left-60 right-70 h-12 bg-opacity-80 z-5 flex items-center px-4 gap-2" style="background: var(--bg-secondary); border-bottom: 1px solid var(--border);">
    <button class="btn tooltip" data-tip="Toggle Grid" onclick="toggleGrid()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="3" y1="15" x2="21" y2="15"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
        <line x1="15" y1="3" x2="15" y2="21"/>
      </svg>
    </button>
    <button class="btn tooltip" data-tip="Reset Camera" onclick="resetCamera()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v4m0 12v4m10-10h-4M6 12H2"/>
      </svg>
    </button>
    <div style="width: 1px; height: 24px; background: var(--border); margin: 0 8px;"></div>
    <span class="text-xs" style="color: var(--text-secondary);">Resolution:</span>
    <select id="resolutionSelect" class="input-field" style="width: 100px;" onchange="changeResolution()">
      <option value="0.5">50%</option>
      <option value="1" selected>100%</option>
      <option value="1.5">150%</option>
      <option value="2">200%</option>
    </select>
    <div style="flex: 1;"></div>
    <span class="mono text-xs" id="fpsCounter" style="color: var(--accent);">60 FPS</span>
  </div>

  <!-- Viewport -->
  <div id="viewport">
    <div class="viewport-grid" id="gridOverlay"></div>
    <canvas id="canvas"></canvas>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-item">
      <div style="width: 8px; height: 8px; background: var(--accent); border-radius: 50%;"></div>
      <span>Ready</span>
    </div>
    <div class="status-item mono">
      <span id="objectCount">Objects: 0</span>
    </div>
    <div class="status-item mono">
      <span id="cameraInfo">Camera: 0, 0, 0</span>
    </div>
    <div style="flex: 1;"></div>
    <div class="status-item">
      <span>LMB: Select | MMB: Pan | RMB: Rotate | Scroll: Zoom</span>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { FontLoader } from 'three/addons/loaders/FontLoader.js';
    import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

    // Global state
    let scene, camera, renderer, controls;
    let sceneObjects = [];
    let selectedObject = null;
    let objectIdCounter = 0;
    let gridHelper = null;
    let showGrid = true;
    let loadedFont = null;
    let lastTime = performance.now();
    let frameCount = 0;

    // Initialize
    function init() {
      // Scene
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a0f);
      scene.fog = new THREE.Fog(0x0a0a0f, 50, 200);

      // Camera
      camera = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);
      camera.position.set(8, 6, 8);

      // Renderer
      const canvas = document.getElementById('canvas');
      renderer = new THREE.WebGLRenderer({ 
        canvas, 
        antialias: true,
        alpha: true 
      });
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.2;

      // Controls
      controls = new OrbitControls(camera, canvas);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.screenSpacePanning = true;

      // Grid
      gridHelper = new THREE.GridHelper(50, 50, 0x00d4aa, 0x1a1a25);
      gridHelper.material.opacity = 0.3;
      gridHelper.material.transparent = true;
      scene.add(gridHelper);

      // Default lights
      const ambient = new THREE.AmbientLight(0x404060, 0.5);
      scene.add(ambient);

      // Default object
      addObject('box');

      // Load font for text objects
      const fontLoader = new FontLoader();
      fontLoader.load('https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_regular.typeface.json', (font) => {
        loadedFont = font;
      });

      // Resize
      onResize();
      window.addEventListener('resize', onResize);

      // Animation
      animate();
    }

    function onResize() {
      const viewport = document.getElementById('viewport');
      const rect = viewport.getBoundingClientRect();
      const res = parseFloat(document.getElementById('resolutionSelect').value);
      
      camera.aspect = rect.width / rect.height;
      camera.updateProjectionMatrix();
      
      renderer.setSize(rect.width, rect.height);
      renderer.setPixelRatio(window.devicePixelRatio * res);
    }

    function animate() {
      requestAnimationFrame(animate);
      
      controls.update();
      renderer.render(scene, camera);
      
      // FPS counter
      frameCount++;
      const now = performance.now();
      if (now - lastTime >= 1000) {
        document.getElementById('fpsCounter').textContent = frameCount + ' FPS';
        frameCount = 0;
        lastTime = now;
      }
      
      // Update camera info
      const pos = camera.position;
      document.getElementById('cameraInfo').textContent = 
        `Camera: ${pos.x.toFixed(1)}, ${pos.y.toFixed(1)}, ${pos.z.toFixed(1)}`;
    }

    // Create geometry based on type
    function createGeometry(type) {
      switch(type) {
        case 'box':
          return new THREE.BoxGeometry(1, 1, 1);
        case 'cylinder':
          return new THREE.CylinderGeometry(0.5, 0.5, 1, 32);
        case 'sphere':
          return new THREE.SphereGeometry(0.5, 32, 32);
        case 'plane':
          return new THREE.PlaneGeometry(1, 1);
        case 'text':
          if (loadedFont) {
            return new TextGeometry('Text', {
              font: loadedFont,
              size: 0.5,
              height: 0.1,
            });
          }
          return new THREE.BoxGeometry(1, 0.2, 0.5);
        default:
          return new THREE.BoxGeometry(1, 1, 1);
      }
    }

    // Create material based on type
    function createMaterial(type, color) {
      const baseColor = new THREE.Color(color);
      
      switch(type) {
        case 'glass':
          return new THREE.MeshPhysicalMaterial({
            color: baseColor,
            metalness: 0,
            roughness: 0,
            transmission: 0.9,
            thickness: 0.5,
            transparent: true,
            opacity: 0.5,
          });
        case 'metal':
          return new THREE.MeshStandardMaterial({
            color: baseColor,
            metalness: 1,
            roughness: 0.2,
          });
        case 'matte':
        default:
          return new THREE.MeshStandardMaterial({
            color: baseColor,
            metalness: 0,
            roughness: 0.8,
          });
      }
    }

    // Add object
    window.addObject = function(type) {
      const geometry = createGeometry(type);
      const material = createMaterial('matte', '#00d4aa');
      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      
      // Random position offset
      mesh.position.set(
        (Math.random() - 0.5) * 4,
        0.5,
        (Math.random() - 0.5) * 4
      );
      
      const objData = {
        id: objectIdCounter++,
        name: type.charAt(0).toUpperCase() + type.slice(1) + '_' + objectIdCounter,
        type: type,
        mesh: mesh,
        isLight: false,
        materialType: 'matte',
        color: '#00d4aa'
      };
      
      sceneObjects.push(objData);
      scene.add(mesh);
      
      updateObjectList();
      selectObject(objData.id);
      updateStatus();
    };

    // Add light
    window.addLight = function(type) {
      let light, helper;
      
      switch(type) {
        case 'point':
          light = new THREE.PointLight(0xffffff, 50, 50);
          light.position.set(2, 4, 2);
          helper = new THREE.PointLightHelper(light, 0.3);
          break;
        case 'directional':
          light = new THREE.DirectionalLight(0xffffff, 2);
          light.position.set(5, 10, 5);
          light.castShadow = true;
          helper = new THREE.DirectionalLightHelper(light, 1);
          break;
        case 'spot':
          light = new THREE.SpotLight(0xffffff, 50);
          light.position.set(0, 5, 0);
          light.angle = Math.PI / 6;
          light.penumbra = 0.3;
          light.castShadow = true;
          helper = new THREE.SpotLightHelper(light);
          break;
      }
      
      scene.add(light);
      scene.add(helper);
      
      const objData = {
        id: objectIdCounter++,
        name: type.charAt(0).toUpperCase() + type.slice(1) + 'Light_' + objectIdCounter,
        type: type + 'Light',
        mesh: light,
        helper: helper,
        isLight: true,
        color: '#ffffff',
        intensity: type === 'directional' ? 2 : 50
      };
      
      sceneObjects.push(objData);
      updateObjectList();
      selectObject(objData.id);
      updateStatus();
    };

    // Update object list
    function updateObjectList() {
      const list = document.getElementById('objectList');
      list.innerHTML = '';
      
      sceneObjects.forEach(obj => {
        const item = document.createElement('div');
        item.className = 'object-item' + (selectedObject && selectedObject.id === obj.id ? ' selected' : '');
        item.onclick = () => selectObject(obj.id);
        
        const icon = obj.isLight ? getLightIcon(obj.type) : getShapeIcon(obj.type);
        
        item.innerHTML = `
          <div class="object-icon">${icon}</div>
          <span class="text-xs flex-1">${obj.name}</span>
          <button class="btn text-xs py-1 px-2" onclick="event.stopPropagation(); deleteObject(${obj.id})" style="color: var(--danger);">x</button>
        `;
        
        list.appendChild(item);
      });
    }

    function getShapeIcon(type) {
      const icons = {
        box: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>',
        cylinder: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 5v14c0 1.66-4.03 3-9 3s-9-1.34-9-3V5"/></svg>',
        sphere: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>',
        plane: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="1"/></svg>',
        text: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>'
      };
      return icons[type] || icons.box;
    }

    function getLightIcon(type) {
      const icons = {
        pointLight: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffaa00" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>',
        directionalLight: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffaa00" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>',
        spotLight: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffaa00" stroke-width="2"><path d="M12 2v8"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="m16 6-4 4-4-4"/></svg>'
      };
      return icons[type] || icons.pointLight;
    }

    // Select object
    function selectObject(id) {
      const obj = sceneObjects.find(o => o.id === id);
      if (!obj) return;
      
      selectedObject = obj;
      updateObjectList();
      updatePropertiesPanel();
    }

    // Update properties panel
    function updatePropertiesPanel() {
      const panel = document.getElementById('propertiesPanel');
      
      if (!selectedObject) {
        panel.innerHTML = '<div class="p-4 text-center text-sm" style="color: var(--text-secondary);">Select an object to edit</div>';
        return;
      }
      
      const obj = selectedObject;
      const mesh = obj.mesh;
      const pos = mesh.position;
      const rot = mesh.rotation;
      const scale = mesh.scale;
      
      let html = `
        <div class="property-row">
          <div class="property-label">Name</div>
          <input type="text" class="input-field" value="${obj.name}" onchange="updateName(this.value)">
        </div>
        
        <div class="panel-header">Transform</div>
        
        <div class="property-row">
          <div class="property-label">Position</div>
          <div class="property-value">
            <input type="number" step="0.1" class="input-field axis-input axis-x" value="${pos.x.toFixed(2)}" onchange="updatePosition('x', this.value)">
            <input type="number" step="0.1" class="input-field axis-input axis-y" value="${pos.y.toFixed(2)}" onchange="updatePosition('y', this.value)">
            <input type="number" step="0.1" class="input-field axis-input axis-z" value="${pos.z.toFixed(2)}" onchange="updatePosition('z', this.value)">
          </div>
        </div>
        
        <div class="property-row">
          <div class="property-label">Rotation</div>
          <div class="property-value">
            <input type="number" step="5" class="input-field axis-input axis-x" value="${THREE.MathUtils.radToDeg(rot.x).toFixed(0)}" onchange="updateRotation('x', this.value)">
            <input type="number" step="5" class="input-field axis-input axis-y" value="${THREE.MathUtils.radToDeg(rot.y).toFixed(0)}" onchange="updateRotation('y', this.value)">
            <input type="number" step="5" class="input-field axis-input axis-z" value="${THREE.MathUtils.radToDeg(rot.z).toFixed(0)}" onchange="updateRotation('z', this.value)">
          </div>
        </div>
        
        <div class="property-row">
          <div class="property-label">Scale</div>
          <div class="property-value">
            <input type="number" step="0.1" min="0.1" class="input-field axis-input axis-x" value="${scale.x.toFixed(2)}" onchange="updateScale('x', this.value)">
            <input type="number" step="0.1" min="0.1" class="input-field axis-input axis-y" value="${scale.y.toFixed(2)}" onchange="updateScale('y', this.value)">
            <input type="number" step="0.1" min="0.1" class="input-field axis-input axis-z" value="${scale.z.toFixed(2)}" onchange="updateScale('z', this.value)">
          </div>
        </div>
      `;
      
      if (!obj.isLight) {
        html += `
          <div class="panel-header">Material</div>
          
          <div class="property-row">
            <div class="property-label">Color</div>
            <input type="color" value="${obj.color}" onchange="updateColor(this.value)">
          </div>
          
          <div class="property-row">
            <div class="property-label">Type</div>
            <div class="property-value" style="flex-wrap: wrap;">
              <button class="btn material-btn ${obj.materialType === 'matte' ? 'active' : ''}" onclick="updateMaterialType('matte')">Matte</button>
              <button class="btn material-btn ${obj.materialType === 'metal' ? 'active' : ''}" onclick="updateMaterialType('metal')">Metal</button>
              <button class="btn material-btn ${obj.materialType === 'glass' ? 'active' : ''}" onclick="updateMaterialType('glass')">Glass</button>
            </div>
          </div>
          
          <div class="property-row">
            <div class="property-label">Roughness</div>
            <div class="slider-container flex-1">
              <input type="range" min="0" max="1" step="0.01" value="${mesh.material.roughness}" onchange="updateRoughness(this.value)">
              <span class="mono text-xs" style="width: 30px;">${mesh.material.roughness.toFixed(2)}</span>
            </div>
          </div>
          
          <div class="property-row">
            <div class="property-label">Metalness</div>
            <div class="slider-container flex-1">
              <input type="range" min="0" max="1" step="0.01" value="${mesh.material.metalness}" onchange="updateMetalness(this.value)">
              <span class="mono text-xs" style="width: 30px;">${mesh.material.metalness.toFixed(2)}</span>
            </div>
          </div>
        `;
      } else {
        html += `
          <div class="panel-header">Light</div>
          
          <div class="property-row">
            <div class="property-label">Color</div>
            <input type="color" value="${obj.color}" onchange="updateLightColor(this.value)">
          </div>
          
          <div class="property-row">
            <div class="property-label">Intensity</div>
            <div class="slider-container flex-1">
              <input type="range" min="0" max="100" step="1" value="${obj.intensity}" onchange="updateLightIntensity(this.value)">
              <span class="mono text-xs" style="width: 30px;">${obj.intensity}</span>
            </div>
          </div>
        `;
        
        if (obj.type === 'spotLight') {
          html += `
            <div class="property-row">
              <div class="property-label">Angle</div>
              <div class="slider-container flex-1">
                <input type="range" min="0.1" max="1.5" step="0.1" value="${mesh.angle}" onchange="updateSpotAngle(this.value)">
                <span class="mono text-xs" style="width: 30px;">${mesh.angle.toFixed(1)}</span>
              </div>
            </div>
          `;
        }
      }
      
      if (obj.type === 'text') {
        html += `
          <div class="panel-header">Text</div>
          <div class="property-row">
            <div class="property-label">Content</div>
            <input type="text" class="input-field" value="Text" onchange="updateTextContent(this.value)">
          </div>
        `;
      }
      
      panel.innerHTML = html;
    }

    // Update functions
    window.updateName = function(value) {
      if (selectedObject) {
        selectedObject.name = value;
        updateObjectList();
      }
    };

    window.updatePosition = function(axis, value) {
      if (selectedObject && selectedObject.mesh) {
        selectedObject.mesh.position[axis] = parseFloat(value);
      }
    };

    window.updateRotation = function(axis, value) {
      if (selectedObject && selectedObject.mesh) {
        selectedObject.mesh.rotation[axis] = THREE.MathUtils.degToRad(parseFloat(value));
      }
    };

    window.updateScale = function(axis, value) {
      if (selectedObject && selectedObject.mesh) {
        const v = Math.max(0.1, parseFloat(value));
        selectedObject.mesh.scale[axis] = v;
      }
    };

    window.updateColor = function(value) {
      if (selectedObject && !selectedObject.isLight) {
        selectedObject.color = value;
        selectedObject.mesh.material.color.set(value);
      }
    };

    window.updateMaterialType = function(type) {
      if (selectedObject && !selectedObject.isLight) {
        selectedObject.materialType = type;
        const oldMat = selectedObject.mesh.material;
        selectedObject.mesh.material = createMaterial(type, selectedObject.color);
        oldMat.dispose();
        updatePropertiesPanel();
      }
    };

    window.updateRoughness = function(value) {
      if (selectedObject && !selectedObject.isLight) {
        selectedObject.mesh.material.roughness = parseFloat(value);
        updatePropertiesPanel();
      }
    };

    window.updateMetalness = function(value) {
      if (selectedObject && !selectedObject.isLight) {
        selectedObject.mesh.material.metalness = parseFloat(value);
        updatePropertiesPanel();
      }
    };

    window.updateLightColor = function(value) {
      if (selectedObject && selectedObject.isLight) {
        selectedObject.color = value;
        selectedObject.mesh.color.set(value);
      }
    };

    window.updateLightIntensity = function(value) {
      if (selectedObject && selectedObject.isLight) {
        selectedObject.intensity = parseFloat(value);
        selectedObject.mesh.intensity = parseFloat(value);
        updatePropertiesPanel();
      }
    };

    window.updateSpotAngle = function(value) {
      if (selectedObject && selectedObject.type === 'spotLight') {
        selectedObject.mesh.angle = parseFloat(value);
        if (selectedObject.helper) selectedObject.helper.update();
        updatePropertiesPanel();
      }
    };

    window.updateTextContent = function(value) {
      if (selectedObject && selectedObject.type === 'text' && loadedFont) {
        const oldGeom = selectedObject.mesh.geometry;
        selectedObject.mesh.geometry = new TextGeometry(value, {
          font: loadedFont,
          size: 0.5,
          height: 0.1,
        });
        oldGeom.dispose();
      }
    };

    window.deleteObject = function(id) {
      const index = sceneObjects.findIndex(o => o.id === id);
      if (index === -1) return;
      
      const obj = sceneObjects[index];
      scene.remove(obj.mesh);
      if (obj.helper) scene.remove(obj.helper);
      if (obj.mesh.geometry) obj.mesh.geometry.dispose();
      if (obj.mesh.material) obj.mesh.material.dispose();
      
      sceneObjects.splice(index, 1);
      
      if (selectedObject && selectedObject.id === id) {
        selectedObject = null;
      }
      
      updateObjectList();
      updatePropertiesPanel();
      updateStatus();
    };

    window.toggleGrid = function() {
      showGrid = !showGrid;
      gridHelper.visible = showGrid;
      document.getElementById('gridOverlay').style.display = showGrid ? 'block' : 'none';
    };

    window.resetCamera = function() {
      camera.position.set(8, 6, 8);
      camera.lookAt(0, 0, 0);
      controls.target.set(0, 0, 0);
    };

    window.changeResolution = function() {
      onResize();
    };

    function updateStatus() {
      document.getElementById('objectCount').textContent = 'Objects: ' + sceneObjects.length;
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Delete' && selectedObject) {
        deleteObject(selectedObject.id);
      }
      if (e.key === 'Escape') {
        selectedObject = null;
        updateObjectList();
        updatePropertiesPanel();
      }
    });

    // Click to select
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    document.getElementById('canvas').addEventListener('click', (e) => {
      const rect = e.target.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      
      raycaster.setFromCamera(mouse, camera);
      
      const meshes = sceneObjects.filter(o => !o.isLight).map(o => o.mesh);
      const intersects = raycaster.intersectObjects(meshes);
      
      if (intersects.length > 0) {
        const hitMesh = intersects[0].object;
        const obj = sceneObjects.find(o => o.mesh === hitMesh);
        if (obj) selectObject(obj.id);
      }
    });

    // Initialize
    init();
  </script>
</body>
</html>
