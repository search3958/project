<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaramCode Ultimate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg-page: #0f1117; --bg-sidebar: #1c1d22; --bg-editor: #0d0f14;
            --accent: #464d61; --text-main: #e2e8f0; --text-dim: #64748b; --border: rgba(255, 255, 255, 0.06);
        }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-page); color: var(--text-main); overflow: hidden; }
        
        /* ナビゲーション */
        #nav-strip { width: 56px; background: #0a0c10; display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 15px; border-right: 1px solid var(--border); flex-shrink: 0; }
        .nav-btn { cursor: pointer; width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-dim); transition: 0.2s; }
        .nav-btn.active { color: var(--accent); background: var(--accent);  border-radius: 8px; }

        /* サイドバー共通 */
        #sidebar { width: 320px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-panel { display: none; flex-direction: column; height: 100%; overflow: hidden; }
        .sidebar-panel.active { display: flex; }
        .header-box { padding: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .header-box h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin: 0 0 10px 0; }

        /* エクスプローラー */
        #tree-container { flex: 1; overflow-y: auto; padding: 5px 0; font-size: 13px; }
        .tree-node { cursor: pointer; }
        .tree-row { display: flex; align-items: center; padding: 4px 12px; gap: 6px; white-space: nowrap; }
        .tree-row:hover { background: rgba(255,255,255,0.04); }
        .tree-row.selected { background: rgba(255,255,255,0.08); color: var(--accent); }
        .folder-content { display: none; }
        .folder-content.open { display: block; }
        .chevron { width: 14px; font-size: 9px; transition: transform 0.2s; display: inline-block; text-align: center; }
        .open > .tree-row .chevron { transform: rotate(90deg); }

        /* インスペクター（折りたたみ対応） */
        #info-container { flex: 1; overflow-y: auto; padding: 10px; }
        details { margin-bottom: 8px; border: 1px solid var(--border); border-radius: 4px; background: rgba(255,255,255,0.02); }
        summary { padding: 8px; cursor: pointer; font-size: 12px; font-weight: bold; color: var(--text-dim); outline: none; }
        .info-item { padding: 6px 15px; border-top: 1px solid var(--border); color: #b392ff; font-family: monospace; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* チャット */
        #chat-history { flex: 1; overflow-y: auto; padding: 15px; font-size: 13px; border-bottom: 1px solid var(--border); }
        .chat-message { margin-bottom: 15px; padding: 10px; border-radius: 6px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); }
        .chat-message.ai { border-left: 3px solid var(--accent); background: rgba(255, 60, 60, 0.02); }

        /* エディタ */
        #editor-container { flex: 1; display: flex; flex-direction: column; background: var(--bg-editor); min-width: 0; }
        #editor-topbar { height: 40px; background: #11131a; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--border); gap: 10px; flex-shrink: 0; justify-content: space-between; }
        #editor-wrapper { flex: 1; overflow: auto; }
        #code-display { 
            margin: 0; padding: 15px; font-family: 'Fira Code', monospace; font-size: 14px; 
            line-height: 1.6; outline: none; display: inline-block; min-width: 100%; 
            white-space: pre; box-sizing: border-box; tab-size: 4;
        }

        /* 汎用 */
        button { background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        button.secondary { background: #2d313d; margin-left: 5px; }
        textarea { width: 100%; height: 80px; background: #1c1f2a; color: white; border: 1px solid var(--border); border-radius: 6px; padding: 10px; resize: none; font-size: 13px; box-sizing: border-box; }
        #chat-status { font-size: 11px; margin-top: 5px; color: var(--accent); }
        #save-indicator { font-size: 11px; color: var(--text-dim); }
    </style>
</head>
<body>

    <nav id="nav-strip">
        <div class="nav-btn active" onclick="switchPanel('files', this)" title="Explorer">📁</div>
        <div class="nav-btn" onclick="switchPanel('info', this)" title="Inspector">🔍</div>
        <div class="nav-btn" onclick="switchPanel('chat', this)" title="AI Chat">🧠</div>
    </nav>

    <aside id="sidebar">
        <div id="panel-files" class="sidebar-panel active">
            <div class="header-box">
                <h2>Explorer</h2>
                <button onclick="openLocalFolder()">Open Folder</button>
                <button class="secondary" onclick="createNewFile()">New File</button>
            </div>
            <div id="tree-container"></div>
        </div>

        <div id="panel-info" class="sidebar-panel">
            <div class="header-box"><h2>Inspector</h2></div>
            <div id="info-container"></div>
        </div>

        <div id="panel-chat" class="sidebar-panel">
            <div class="header-box"><h2>AI Assistant</h2></div>
            <div id="chat-history"><div class="chat-message ai">解析するコードを開いてください。</div></div>
            <div style="padding:15px; border-top:1px solid var(--border);">
                <textarea id="promptInput" placeholder="このコードの改善点は？"></textarea>
                <button style="width:100%; margin-top:10px;" onclick="askAI()">Ask z.ai</button>
                <div id="chat-status"></div>
            </div>
        </div>
    </aside>

    <main id="editor-container">
        <div id="editor-topbar">
            <div>
                <span id="current-filename" style="font-size:13px; color:var(--text-dim);">ファイルを開き，開始します。</span>
                <span id="file-ext-tag" style="display:none; font-size:10px; border:1px solid var(--accent); padding:2px 6px; border-radius:4px; color:var(--accent); margin-left:10px;"></span>
            </div>
            <div id="save-indicator"></div>
        </div>
        <div id="editor-wrapper">
            <pre><code id="code-display" contenteditable="true" spellcheck="false" oninput="triggerAutoSave()"></code></pre>
        </div>
    </main>

    <script>const API_URL = 'https://sbmatwewsgkuidzbxbxp.supabase.co/functions/v1/zai';
let currentFileHandle = null;
let rootHandle = null; // ルートディレクトリを保持
let autoSaveTimer = null;

function switchPanel(id, el) {
    document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + id).classList.add('active');
    el.classList.add('active');
}

/**
 * フォルダを開く（ルートの取得と初期描画）
 */
async function openLocalFolder() {
    try {
        rootHandle = await window.showDirectoryPicker();
        await refreshFileTree();
    } catch (e) {
        console.error("Folder selection cancelled or failed", e);
    }
}

/**
 * ツリー全体をリフレッシュする
 */
async function refreshFileTree() {
    if (!rootHandle) return;
    const container = document.getElementById('tree-container');
    container.innerHTML = '';
    await renderTree(rootHandle, container, 0);
}

/**
 * 新規ファイル作成
 * 作成後、ツリーを自動で再描画します
 */
async function createNewFile() {
    try {
        // ルートが選択されていない場合は警告
        if (!rootHandle) {
            alert("先にフォルダを開いてください。");
            return;
        }

        const handle = await window.showSaveFilePicker();
        currentFileHandle = handle;
        document.getElementById('code-display').innerText = '';
        
        await saveFile(); // 初期保存
        document.getElementById('current-filename').innerText = handle.name;
        
        // ★ 変更点：ファイル作成後にツリーを再描画
        await refreshFileTree();
    } catch (e) {
        console.error("File creation cancelled", e);
    }
}

/**
 * 再帰的にツリーを描画する
 */
async function renderTree(handle, container, depth) {
    const entries = [];
    for await (const entry of handle.values()) {
        if (entry.name.startsWith('.')) continue; // 隠しファイル除外
        entries.push(entry);
    }
    
    // フォルダを上に、名前順でソート
    entries.sort((a, b) => (b.kind === 'directory') - (a.kind === 'directory') || a.name.localeCompare(b.name));

    for (const entry of entries) {
        const node = document.createElement('div');
        node.className = 'tree-node';
        const row = document.createElement('div');
        row.className = 'tree-row';
        row.style.paddingLeft = `${depth * 15 + 12}px`;
        
        const isDir = entry.kind === 'directory';
        row.innerHTML = `<span class="chevron">${isDir ? '▶' : ''}</span> <span>${isDir ? '📁' : '📄'} ${entry.name}</span>`;
        node.appendChild(row);
        container.appendChild(node);

        if (isDir) {
            const content = document.createElement('div');
            content.className = 'folder-content';
            node.appendChild(content);
            row.onclick = async (e) => {
                e.stopPropagation();
                const isOpen = content.classList.toggle('open');
                row.parentElement.classList.toggle('open', isOpen);
                // 初回展開時のみ読み込み
                if (isOpen && content.innerHTML === '') {
                    await renderTree(entry, content, depth + 1);
                }
            };
        } else {
            row.onclick = () => openFile(entry, row);
        }
    }
}

async function openFile(handle, row) {
    document.querySelectorAll('.tree-row').forEach(r => r.classList.remove('selected'));
    row.classList.add('selected');

    try {
        const file = await handle.getFile();
        const buf = await file.slice(0, 4096).arrayBuffer();
        if (new Uint8Array(buf).some(b => b === 0)) {
            alert("Binary file ignored.");
            return;
        }

        currentFileHandle = handle;
        const text = await file.text();
        const ext = handle.name.split('.').pop().toLowerCase();
        
        document.getElementById('current-filename').innerText = handle.name;
        const tag = document.getElementById('file-ext-tag');
        tag.innerText = ext.toUpperCase();
        tag.style.display = 'block';

        const display = document.getElementById('code-display');
        display.innerText = text;
        display.className = `language-${ext}`;

        // ハイライト（大きなファイルは避ける）
        if (text.length < 60000) {
            hljs.highlightElement(display);
        }
        analyzeFile(text, ext);
    } catch (e) {
        console.error("Failed to open file", e);
    }
}

function analyzeFile(content, ext) {
    const container = document.getElementById('info-container');
    container.innerHTML = '';
    
    const groups = {
        functions: { name: "Functions", items: [] },
        variables: { name: "Definitions", items: [] },
        elements: { name: "Elements/Styles", items: [] }
    };

    if (ext === 'js' || ext === 'ts') {
        const fRegex = /(?:function\s+([a-zA-Z0-9_]+)|([a-zA-Z0-9_]+)\s*=\s*(?:\([^)]*\)|[a-zA-Z0-9_]+)?\s*=>)/g;
        const vRegex = /(?:const|let|var)\s+([a-zA-Z0-9_]+)/g;
        let m;
        while (m = fRegex.exec(content)) groups.functions.items.push(m[1] || m[2]);
        while (m = vRegex.exec(content)) groups.variables.items.push(m[1]);
    } else if (ext === 'css') {
        const regex = /([.#][a-zA-Z0-9_-]+)\s*\{/g;
        let m; while (m = regex.exec(content)) groups.elements.items.push(m[1]);
    } else if (ext === 'html') {
        const doc = new DOMParser().parseFromString(content, 'text/html');
        const walk = (n) => {
            if (n.nodeType === 1) {
                groups.elements.items.push(`${n.tagName.toLowerCase()}${n.className ? '.'+n.className.replace(/ /g,'.') : ''}`);
                Array.from(n.children).forEach(walk);
            }
        };
        walk(doc.body || doc);
    }

    Object.values(groups).forEach(g => {
        if (g.items.length === 0) return;
        const det = document.createElement('details');
        det.open = true;
        det.innerHTML = `<summary>${g.name} (${g.items.length})</summary>`;
        [...new Set(g.items)].forEach(item => {
            const div = document.createElement('div');
            div.className = 'info-item';
            div.innerText = item;
            det.appendChild(div);
        });
        container.appendChild(det);
    });
    if (!container.innerHTML) container.innerHTML = 'No structure found';
}

function triggerAutoSave() {
    document.getElementById('save-indicator').innerText = "Typing...";
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(saveFile, 1000);
}

async function saveFile() {
    if (!currentFileHandle) return;
    try {
        const writable = await currentFileHandle.createWritable();
        const content = document.getElementById('code-display').innerText;
        await writable.write(content);
        await writable.close();
        document.getElementById('save-indicator').innerText = "Saved";
        analyzeFile(content, currentFileHandle.name.split('.').pop());
    } catch (e) {
        document.getElementById('save-indicator').innerText = "Error";
        console.error("Save failed", e);
    }
}

async function askAI() {
    const input = document.getElementById('promptInput');
    const status = document.getElementById('chat-status');
    const history = document.getElementById('chat-history');
    if (!input.value) return;

    const userMsg = document.createElement('div');
    userMsg.className = 'chat-message';
    userMsg.innerText = input.value;
    history.appendChild(userMsg);
    
    const prompt = input.value;
    input.value = '';
    status.innerText = "Thinking...";
    history.scrollTop = history.scrollHeight;

    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: `Code:\n${document.getElementById('code-display').innerText.substring(0, 4000)}\n\nUser: ${prompt}` })
        });
        const data = await res.json();
        const aiMsg = document.createElement('div');
        aiMsg.className = 'chat-message ai';
        aiMsg.innerText = data.choices[0].message.content;
        history.appendChild(aiMsg);
    } catch (e) {
        status.innerText = "Error occurred.";
    } finally {
        status.innerText = "";
        history.scrollTop = history.scrollHeight;
    }
}

window.addEventListener('keydown', async (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        saveFile();
    }
});</script>
</body>
</html>
