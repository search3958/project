<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>EZ-Shell Ultimate Runtime v5.1</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --accent: #238636; --text: #c9d1d9; --border: #30363d; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #161b22; padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .workspace { flex: 2; display: flex; flex-direction: column; padding: 15px; gap: 10px; border-right: 1px solid var(--border); }
        h2 { font-size: 0.8rem; color: #8b949e; margin: 0; text-transform: uppercase; }
        textarea { flex: 1; background: #010409; color: #e6edf3; padding: 15px; border: 1px solid var(--border); border-radius: 6px; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.5; resize: none; outline: none; }
        .terminal-container { flex: 1; display: flex; flex-direction: column; background: #000; border-radius: 6px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        #console { flex: 1; padding: 15px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 15px; line-height: 0; }
        
        /* ビットマップ文字表示用 */
        .console-line { 
            display: block; 
            line-height: 8px;
            height: 8px;
            white-space: nowrap;
            font-size: 0;
        }
        .text-span {
            display: inline-block;
            line-height: 8px;
            height: 8px;
            font-size: 15px;
            vertical-align: top;
            font-family: 'Consolas', monospace;
        }
        .bitmap-char {
            display: inline-grid;
            grid-template-columns: repeat(4, 1px);
            grid-template-rows: repeat(8, 1px);
            width: 4px;
            height: 8px;
            gap: 0;
            vertical-align: top;
            line-height: 0;
        }
        .bitmap-pixel {
            width: 1px;
            height: 1px;
            display: block;
        }
        
        /* スケール対応 */
        .scale-2 .bitmap-char { 
            grid-template-columns: repeat(4, 2px);
            grid-template-rows: repeat(8, 2px);
            width: 8px;
            height: 16px;
        }
        .scale-2 .bitmap-pixel { width: 2px; height: 2px; }
        .scale-2 .console-line { line-height: 16px; height: 16px; }
        .scale-2 .text-span { line-height: 16px; height: 16px; font-size: 30px; }
        
        .scale-3 .bitmap-char { 
            grid-template-columns: repeat(4, 3px);
            grid-template-rows: repeat(8, 3px);
            width: 12px;
            height: 24px;
        }
        .scale-3 .bitmap-pixel { width: 3px; height: 3px; }
        .scale-3 .console-line { line-height: 24px; height: 24px; }
        .scale-3 .text-span { line-height: 24px; height: 24px; font-size: 45px; }
        
        .input-area { display: flex; background: #0d1117; padding: 10px; border-top: 1px solid var(--border); align-items: center; z-index: 5; }
        .input-area span { color: #39ff14; margin-right: 10px; font-weight: bold; }
        #term-input { flex: 1; background: transparent; border: none; color: white; font-family: inherit; font-size: 15px; outline: none; }
        .docs-panel { width: 400px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .docs-panel.hidden { width: 0; border: none; overflow: hidden; }
        #docs-content { padding: 20px; overflow-y: auto; font-size: 14px; line-height: 1.6; }
        #docs-content h1 { color: #58a6ff; border-bottom: 2px solid var(--border); padding-bottom: 8px; }
        #docs-content h2 { color: #58a6ff; margin-top: 24px; }
        #docs-content h3 { color: #8b949e; margin-top: 16px; }
        #docs-content code { background: #161b22; padding: 2px 6px; border-radius: 3px; color: #ff7b72; }
        #docs-content pre { background: #161b22; padding: 12px; border-radius: 6px; overflow-x: auto; }
        #docs-content pre code { background: none; padding: 0; }
        .btn { padding: 8px 16px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); font-weight: bold; }
        .btn-run { background: var(--accent); color: white; border: none; font-size: 16px; }
        .btn-stop { background: #da3633; color: white; border: none; font-size: 16px; display: none; }
        select { background: #21262d; color: #c9d1d9; border: 1px solid var(--border); padding: 8px; border-radius: 6px; }
        .status-bar { font-size: 0.75rem; color: #8b949e; padding: 5px 10px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 1.2rem;">EZ-Shell (EZS) <span style="color:#58a6ff;">v5.1 Bitmap</span></div>
    <div style="display: flex; gap: 10px; align-items: center;">
        <select id="sampleSelect" onchange="loadSample()">
            <option value="intro">1. イントロ</option>
            <option value="bitmap_basic">2. カスタムビットマップ文字</option>
            <option value="loading_bar">3. ローディングバー (画面幅)</option>
            <option value="spinner">4. スピナーアニメーション</option>
            <option value="array_demo">5. 配列とループ</option>
            <option value="file_system">6. 仮想ファイルシステム</option>
            <option value="math_lib">7. 数学ライブラリ</option>
            <option value="rpg_advanced">8. RPG (配列+関数)</option>
        </select>
        <button class="btn btn-run" id="runBtn" onclick="runScript()">▶ RUN SCRIPT</button>
        <button class="btn btn-stop" id="stopBtn" onclick="stopScript()">⬛ STOP</button>
        <button class="btn btn-docs" onclick="toggleDocs()">📘 仕様書</button>
    </div>
</header>

<div class="main-container">
    <div class="workspace">
        <textarea id="code" spellcheck="false" placeholder="# EZ-Shell スクリプトをここに記述&#10;# RUN SCRIPT で実行 / 下部の端末で直接コマンド入力も可能"></textarea>
        <div class="terminal-container">
            <div id="console"></div>
            <div class="input-area">
                <span>&gt;</span>
                <input type="text" id="term-input" placeholder="コマンドを入力...">
            </div>
        </div>
        <div class="status-bar">
            <span id="status">Ready | Screen: <span id="screen-size"></span></span>
        </div>
    </div>
    <div id="docs-panel" class="docs-panel">
        <div id="docs-content">仕様書を読み込み中...</div>
    </div>
</div>

<script>
    const samples = {
        intro: `// EZ-Shell v5.1 イントロダクション
echo "EZ-Shell Ultimate へようこそ！"
color cyan
echo "カスタムビットマップ文字が使えます"
reset

// システム変数
echo "画面サイズ: " + $SCREEN_WIDTH + " x " + $SCREEN_HEIGHT + " 文字"

// ビットマップ文字定義
bitmap.define "heart" "0110,1111,1111,0110,0110,0100,0000,0000"
bitmap.print "heart"
echo " ハート文字！"`,

        bitmap_basic: `// カスタムビットマップ文字の基本
scale 2

color yellow
echo "=== 1bit (モノクロ) ==="

// スマイル
bitmap.define "smile" "0110,1001,1001,0000,1001,0110,0000,0000" 1bit
bitmap.print "smile"
bitmap.print "smile"
bitmap.print "smile"

echo ""
color cyan
echo "=== 2bit (グレースケール 4階調) ==="

// グラデーション
bitmap.define "grad" "0000,0111,1222,2333" 2bit
bitmap.print "grad"
bitmap.print "grad"
bitmap.print "grad"

echo ""
color white
echo "=== フルカラー ==="

// 虹色ブロック
bitmap.define "rainbow" "#f00,#f80,#ff0,#0f0,#00f,#808,#f0f,#000" color
bitmap.print "rainbow"
bitmap.print "rainbow"

reset
scale 1`,

        loading_bar: `
        // 画面幅いっぱいのローディングバー (5秒で完了)
scale 2
color cyan
echo "ローディング開始..."

// バーの文字を定義
bitmap.define "bar_full" "1111,1111,1111,1111,1111,1111,1111,1111" 1bit
bitmap.define "bar_empty" "1111,1001,1001,1001,1001,1001,1001,1111" 1bit

set total_chars calc($SCREEN_WIDTH - 10)
set steps 50
set delay calc(5000 / $steps)

set i 0
loop $i <= $steps {
    // 進捗率計算
    set progress calc($i * 100 / $steps)
    set filled calc($i * $total_chars / $steps)
    
    // バー描画
    color yellow
    echo -n "["
    
    color green
    set j 0
    loop $j < $filled {
        bitmap.print "bar_full"
        set j calc($j + 1)
    }
    
    color #333333
    loop $j < $total_chars {
        bitmap.print "bar_empty"
        set j calc($j + 1)
    }
    
    color yellow
    echo "] " + $progress + "%"
    
    wait $delay
    cursor.up 1
    set i calc($i + 1)
}

cursor.down 1
color green
echo "完了！"
reset
scale 1\`,

        spinner: \`// スピナーアニメーション
scale 2

// スピナーフレーム定義
bitmap.define "spin0" "0010,0100,1000,0000,0000,0000,0000,0000" 1bit
bitmap.define "spin1" "0001,0010,0100,1000,0000,0000,0000,0000" 1bit
bitmap.define "spin2" "0000,0001,0010,0100,1000,0000,0000,0000" 1bit
bitmap.define "spin3" "0000,0000,0001,0010,0100,1000,0000,0000" 1bit
bitmap.define "spin4" "0000,0000,0000,0001,0010,0100,1000,0000" 1bit
bitmap.define "spin5" "0000,0000,0000,0000,0001,0010,0100,1000" 1bit

color cyan
set i 0
loop $i < 20 {
    set frame calc($i % 6)
    
    bitmap.print "spin" + $frame
    echo " 読み込み中..."
    
    wait 100
    cursor.up 1
    set i calc($i + 1)
}

cursor.down 1
color green
echo "✓ 完了！"
reset
scale 1`
,

        array_demo: `
array.new fruits
array.push fruits "りんご"
array.push fruits "バナナ"
array.push fruits "オレンジ"

color yellow
echo "=== フルーツリスト ==="
set i 0
loop $i < $fruits.length {
    echo ($i + 1) + ". " + $fruits[$i]
    set i calc($i + 1)
}

reset
echo ""
echo "配列長: " + $fruits.length`,

        file_system: `// 仮想ファイルシステム
color cyan
echo "=== ファイルシステムデモ ==="

fs.write "readme.txt" "EZ-Shellへようこそ！"
fs.write "data.txt" "Sample Data 123"

echo ""
echo "ファイル一覧:"
fs.ls

echo ""
color yellow
echo "readme.txt の内容:"
set content $fs.read("readme.txt")
echo $content

reset`,

        math_lib: `// 数学ライブラリ
color magenta
echo "=== 数学関数デモ ==="

set x 16
echo "sqrt(16) = " + $math.sqrt($x)

set y 5
echo "pow(2, 5) = " + $math.pow(2, $y)

set z -10
echo "abs(-10) = " + $math.abs($z)

set nums "3,7,2,9,1"
echo "max(3,7,2,9,1) = " + $math.max($nums)

set rand $math.random(1, 100)
color cyan
echo "ランダム(1-100): " + $rand`,

        rpg_advanced: `// RPG戦闘システム
func attack(target, damage) {
    set $target calc($$target - $damage)
    return $damage
}

color white
echo "=== モンスター戦闘 ==="

array.new enemies
array.push enemies "スライム:30"
array.push enemies "ゴブリン:50"
array.push enemies "ドラゴン:100"

set current 0
loop $current < $enemies.length {
    set enemy $enemies[$current]
    set data $string.split($enemy, ":")
    set name $data[0]
    set hp $data[1]
    
    color yellow
    echo ""
    echo $name + " が現れた！ (HP: " + $hp + ")"
    
    loop $hp > 0 {
        set dmg $math.random(10, 25)
        set hp calc($hp - $dmg)
        color red
        echo "→ " + $dmg + " ダメージ！残りHP: " + $hp
        wait 400
    }
    
    color green
    echo "✓ " + $name + " を倒した！"
    wait 500
    set current calc($current + 1)
}

color cyan
echo ""
echo "=== 全ての敵を倒した！ ==="`
    };

    // グローバル状態管理
    let runtime = {
        memory: {},
        functions: {},
        arrays: {},
        filesystem: {},
        bitmapChars: {},
        running: false,
        stopFlag: false,
        currentColor: "#39ff14",
        currentScale: 1,
        commandHistory: [],
        historyIndex: -1,
        screenWidth: 0,
        screenHeight: 0,
        cursorY: 0
    };

    function updateScreenSize() {
        const console = document.getElementById('console');
        const charWidth = 4 * runtime.currentScale;
        const charHeight = 8 * runtime.currentScale;
        
        runtime.screenWidth = Math.floor(console.clientWidth / charWidth);
        runtime.screenHeight = Math.floor(console.clientHeight / charHeight);
        
        // システム変数設定
        runtime.memory['SCREEN_WIDTH'] = runtime.screenWidth;
        runtime.memory['SCREEN_HEIGHT'] = runtime.screenHeight;
        
        document.getElementById('screen-size').textContent = 
            `${runtime.screenWidth}x${runtime.screenHeight} (${runtime.currentScale}x)`;
    }

    function appendConsole(content, color = runtime.currentColor, newline = true) {
        const consoleEl = document.getElementById('console');
        
        // 最後の行を取得または新規作成
        let currentLine = consoleEl.lastElementChild;
        if (!currentLine || currentLine.dataset.completed === 'true') {
            currentLine = document.createElement('div');
            currentLine.className = `console-line scale-${runtime.currentScale}`;
            currentLine.dataset.completed = 'false';
            consoleEl.appendChild(currentLine);
            runtime.cursorY++;
        }
        
        // テキストまたはビットマップを追加
        if (typeof content === 'string') {
            const span = document.createElement('span');
            span.className = 'text-span';
            span.style.color = color;
            span.textContent = content;
            currentLine.appendChild(span);
        } else if (content.type === 'bitmap') {
            currentLine.appendChild(content.element);
        }
        
        if (newline) {
            currentLine.dataset.completed = 'true';
        }
        
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    function createBitmapChar(name) {
        const def = runtime.bitmapChars[name];
        if (!def) return null;
        
        const charDiv = document.createElement('div');
        charDiv.className = 'bitmap-char';
        
        if (def.type === '1bit') {
            // モノクロ: 0=透明, 1=現在色
            def.data.forEach(row => {
                row.split('').forEach(pixel => {
                    const pixelDiv = document.createElement('div');
                    pixelDiv.className = 'bitmap-pixel';
                    pixelDiv.style.backgroundColor = pixel === '1' ? runtime.currentColor : 'transparent';
                    charDiv.appendChild(pixelDiv);
                });
            });
        } else if (def.type === '2bit') {
            // グレースケール: 0-3の明度
            const baseColor = runtime.currentColor;
            const rgb = hexToRgb(baseColor);
            
            def.data.forEach(row => {
                row.split('').forEach(pixel => {
                    const pixelDiv = document.createElement('div');
                    pixelDiv.className = 'bitmap-pixel';
                    const intensity = parseInt(pixel) / 3;
                    pixelDiv.style.backgroundColor = 
                        `rgb(${Math.floor(rgb.r * intensity)}, ${Math.floor(rgb.g * intensity)}, ${Math.floor(rgb.b * intensity)})`;
                    charDiv.appendChild(pixelDiv);
                });
            });
        } else if (def.type === 'color') {
            // フルカラー: 各ピクセルに色指定
            def.data.forEach(color => {
                const pixelDiv = document.createElement('div');
                pixelDiv.className = 'bitmap-pixel';
                pixelDiv.style.backgroundColor = color;
                charDiv.appendChild(pixelDiv);
            });
        }
        
        return { type: 'bitmap', element: charDiv };
    }

    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? {
            r: parseInt(result[1], 16),
            g: parseInt(result[2], 16),
            b: parseInt(result[3], 16)
        } : { r: 57, g: 255, b: 20 };
    }

    function setStatus(msg) {
        document.getElementById('status').textContent = msg;
    }

    // 値の解決
    function getValue(expr) {
        if (!expr) return "";
        
        // 配列アクセス
        expr = expr.replace(/\$([a-zA-Z0-9_]+)\[(\d+|\$[a-zA-Z0-9_]+)\]/g, (match, name, idx) => {
            const index = idx.startsWith('$') ? getValue(idx) : parseInt(idx);
            if (runtime.arrays[name] && runtime.arrays[name][index] !== undefined) {
                const val = runtime.arrays[name][index];
                return typeof val === 'string' ? `"${val}"` : val;
            }
            return "undefined";
        });

        // 配列の長さ
        expr = expr.replace(/\$([a-zA-Z0-9_]+)\.length/g, (match, name) => {
            return runtime.arrays[name] ? runtime.arrays[name].length : 0;
        });

        // 変数展開
        expr = expr.replace(/\$\$([a-zA-Z0-9_]+)/g, (_, name) => {
            return runtime.memory[name] ?? 0;
        });

        expr = expr.replace(/\$([a-zA-Z0-9_]+)/g, (_, name) => {
            const val = runtime.memory[name];
            if (val === undefined) return "0";
            return typeof val === 'string' ? `"${val}"` : val;
        });

        // calc() 評価
        if (expr.includes("calc(")) {
            try {
                const calcExpr = expr.match(/calc\((.+)\)/)[1];
                return eval(calcExpr);
            } catch (e) {
                return 0;
            }
        }

        // 文字列連結
        if (expr.includes('+') && !expr.match(/^\d+\s*\+\s*\d+$/)) {
            return expr.split('+').map(s => {
                s = s.trim();
                if (s.startsWith('"') && s.endsWith('"')) return s.slice(1, -1);
                if (s.startsWith('(') && s.endsWith(')')) return getValue(s.slice(1, -1));
                return String(s);
            }).join('');
        }

        if (expr.startsWith('"') && expr.endsWith('"')) return expr.slice(1, -1);
        if (!isNaN(expr)) return Number(expr);
        
        return expr;
    }

    // 標準ライブラリ
    const stdlib = {
        'array.new': (name) => { runtime.arrays[name] = []; },
        'array.push': (name, val) => { if (runtime.arrays[name]) runtime.arrays[name].push(getValue(val)); },
        'array.pop': (name) => { return runtime.arrays[name] ? runtime.arrays[name].pop() : null; },
        'array.clear': (name) => { if (runtime.arrays[name]) runtime.arrays[name] = []; },
        
        'math.sqrt': (n) => Math.sqrt(Number(getValue(n))),
        'math.pow': (a, b) => Math.pow(Number(getValue(a)), Number(getValue(b))),
        'math.abs': (n) => Math.abs(Number(getValue(n))),
        'math.random': (min, max) => {
            const a = Number(getValue(min));
            const b = Number(getValue(max));
            return Math.floor(Math.random() * (b - a + 1)) + a;
        },
        'math.max': (nums) => {
            const arr = String(getValue(nums)).split(',').map(n => Number(n.trim()));
            return Math.max(...arr);
        },
        'math.min': (nums) => {
            const arr = String(getValue(nums)).split(',').map(n => Number(n.trim()));
            return Math.min(...arr);
        },

        'string.split': (str, delim) => {
            const s = String(getValue(str));
            const d = String(getValue(delim));
            const result = s.split(d);
            const arrName = '_split_result_' + Date.now();
            runtime.arrays[arrName] = result;
            return arrName;
        },
        'string.length': (str) => String(getValue(str)).length,
        'string.upper': (str) => String(getValue(str)).toUpperCase(),
        'string.lower': (str) => String(getValue(str)).toLowerCase(),

        'fs.write': (name, content) => { runtime.filesystem[getValue(name)] = getValue(content); },
        'fs.read': (name) => runtime.filesystem[getValue(name)] || "",
        'fs.delete': (name) => { delete runtime.filesystem[getValue(name)]; },
        'fs.ls': () => {
            const files = Object.keys(runtime.filesystem);
            files.forEach(f => appendConsole("  " + f));
        },

        'bitmap.define': (name, data, type = '1bit') => {
            const charName = getValue(name);
            const charData = getValue(data);
            const charType = getValue(type);
            
            if (charType === 'color') {
                // フルカラー: "#RGB,#RGB,..." 形式
                const colors = charData.split(',');
                runtime.bitmapChars[charName] = { type: 'color', data: colors };
            } else if (charType === '2bit') {
                // 2bit: "0123,0123,..." 形式
                const rows = charData.split(',');
                runtime.bitmapChars[charName] = { type: '2bit', data: rows };
            } else {
                // 1bit: "0110,1001,..." 形式
                const rows = charData.split(',');
                runtime.bitmapChars[charName] = { type: '1bit', data: rows };
            }
        },

        'bitmap.print': (name) => {
            const charName = getValue(name);
            const bitmapElement = createBitmapChar(charName);
            if (bitmapElement) {
                appendConsole(bitmapElement, null, false);
            }
        },

        'cursor.up': (n) => {
            const lines = n ? getValue(n) : 1;
            const consoleEl = document.getElementById('console');
            for (let i = 0; i < lines; i++) {
                if (consoleEl.lastElementChild) {
                    consoleEl.removeChild(consoleEl.lastElementChild);
                }
            }
        },

        'cursor.down': (n) => {
            const lines = n ? getValue(n) : 1;
            for (let i = 0; i < lines; i++) {
                appendConsole('');
            }
        }
    };

    function callLibFunction(expr) {
        const match = expr.match(/^([a-z]+)\.([a-z_]+)\s*(.*)$/);
        if (!match) return null;
        
        const [, lib, func, argsStr] = match;
        const funcName = `${lib}.${func}`;
        
        if (!stdlib[funcName]) return null;
        
        if (argsStr.trim()) {
            const args = argsStr.split(',').map(a => a.trim());
            return stdlib[funcName](...args);
        } else {
            return stdlib[funcName]();
        }
    }

    // コマンド実行
    async function executeCommand(line) {
        if (runtime.stopFlag) return;
        if (!line || line.startsWith("//")) return;

        const parts = line.split(/\s+/);
        const cmd = parts[0];

        try {
            // ライブラリコール
            if (line.match(/^[a-z]+\.[a-z_]+/)) {
                const result = callLibFunction(line);
                if (result !== null && result !== undefined) {
                    runtime.memory['_last_result'] = result;
                }
                return;
            }

            switch(cmd) {
                case 'echo': {
                    const content = line.substring(5);
                    const isNoNewline = content.startsWith('-n ');
                    const text = isNoNewline ? content.substring(3) : content;
                    appendConsole(getValue(text), runtime.currentColor, !isNoNewline);
                    break;
                }

                case 'set': {
                    const varName = parts[1];
                    const valueExpr = line.substring(line.indexOf(parts[2]));
                    
                    if (valueExpr.includes('.') && valueExpr.includes('(')) {
                        const result = callLibFunction(valueExpr);
                        runtime.memory[varName] = result !== null ? result : getValue(valueExpr);
                    } else {
                        runtime.memory[varName] = getValue(valueExpr);
                    }
                    break;
                }

                case 'color':
                    runtime.currentColor = parts[1] || "#39ff14";
                    break;

                case 'reset':
                    runtime.currentColor = "#39ff14";
                    break;

                case 'scale':
                    runtime.currentScale = parseInt(parts[1]) || 1;
                    updateScreenSize();
                    break;

                case 'clear':
                    document.getElementById('console').textContent = "";
                    runtime.cursorY = 0;
                    break;

                case 'wait':
                    await new Promise(r => setTimeout(r, getValue(parts[1])));
                    break;

                case 'input': {
                    const promptText = line.substring(line.indexOf(parts[2] || ""));
                    if (promptText) appendConsole(getValue(promptText));
                    
                    runtime.memory[parts[1]] = await new Promise(resolve => {
                        const input = document.getElementById('term-input');
                        const handler = (e) => {
                            if (e.key === 'Enter') {
                                const val = e.target.value;
                                e.target.value = '';
                                appendConsole(val, "#ffffff");
                                input.removeEventListener('keypress', handler);
                                resolve(val);
                            }
                        };
                        input.addEventListener('keypress', handler);
                        input.focus();
                    });
                    break;
                }

                case 'func':
                case 'return':
                case 'try':
                    break;

                default: {
                    const funcMatch = line.match(/^([a-zA-Z_][a-zA-Z0-9_]*)\((.+)\)/);
                    if (funcMatch && runtime.functions[funcMatch[1]]) {
                        const funcName = funcMatch[1];
                        const argsStr = funcMatch[2];
                        const args = argsStr.split(',').map(a => getValue(a.trim()));
                        await executeFunction(funcName, args);
                    }
                }
            }
        } catch (e) {
            appendConsole("⚠ Error: " + e.message, "#ff0000");
        }
    }

    async function executeFunction(name, args) {
        const func = runtime.functions[name];
        if (!func) return;

        const oldVars = {};
        func.params.forEach((param, i) => {
            oldVars[param] = runtime.memory[param];
            runtime.memory[param] = args[i] !== undefined ? args[i] : null;
        });

        await executeLines(func.body);

        func.params.forEach(param => {
            runtime.memory[param] = oldVars[param];
        });

        return runtime.memory['_return'];
    }

    async function executeLines(lines) {
        for (let i = 0; i < lines.length; i++) {
            if (runtime.stopFlag) break;

            const line = lines[i].trim();
            const cmd = line.split(/\s+/)[0];

            if (cmd === 'if' || cmd === 'loop') {
                const condMatch = line.match(/(if|loop)\s+(.+)\s*\{/);
                if (!condMatch) continue;

                const condition = condMatch[2];
                const body = [];
                let depth = 1;
                i++;

                while (i < lines.length && depth > 0) {
                    if (lines[i].includes('{')) depth++;
                    if (lines[i].trim() === '}') depth--;
                    if (depth > 0) body.push(lines[i]);
                    i++;
                }
                i--;

                const evalCondition = () => {
                    let cond = condition.replace(/\$([a-zA-Z0-9_]+)/g, (_, n) => {
                        const v = runtime.memory[n];
                        return typeof v === 'string' ? `"${v}"` : (v ?? 0);
                    });
                    try { return eval(cond); } catch { return false; }
                };

                if (cmd === 'if' && evalCondition()) {
                    await executeLines(body);
                } else if (cmd === 'loop') {
                    while (evalCondition() && !runtime.stopFlag) {
                        await executeLines(body);
                    }
                }
            } else if (cmd === 'try') {
                const body = [];
                let catchBody = [];
                let depth = 1;
                let inCatch = false;
                i++;

                while (i < lines.length && depth > 0) {
                    if (lines[i].trim() === 'catch' && depth === 1) {
                        inCatch = true;
                        i++;
                        continue;
                    }
                    if (lines[i].includes('{')) depth++;
                    if (lines[i].trim() === '}') depth--;
                    
                    if (depth > 0) {
                        if (inCatch) catchBody.push(lines[i]);
                        else body.push(lines[i]);
                    }
                    i++;
                }
                i--;

                try {
                    await executeLines(body);
                } catch (e) {
                    await executeLines(catchBody);
                }
            } else {
                await executeCommand(line);
            }
        }
    }

    async function runScript() {
        runtime.stopFlag = false;
        runtime.running = true;
        document.getElementById('runBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'inline-block';
        setStatus("Running Script...");

        const code = document.getElementById('code').value;
        const lines = code.split('\n')
            .map(l => l.trim())
            .filter(l => l && !l.startsWith("//"));

        runtime.functions = {};
        for (let i = 0; i < lines.length; i++) {
            const funcMatch = lines[i].match(/^func\s+([a-zA-Z_][a-zA-Z0-9_]*)\(([^)]*)\)\s*\{/);
            if (funcMatch) {
                const funcName = funcMatch[1];
                const params = funcMatch[2].split(',').map(p => p.trim()).filter(p => p);
                const body = [];
                let depth = 1;
                i++;

                while (i < lines.length && depth > 0) {
                    if (lines[i].includes('{')) depth++;
                    if (lines[i].trim() === '}') depth--;
                    if (depth > 0) body.push(lines[i]);
                    i++;
                }
                i--;

                runtime.functions[funcName] = { params, body };
            }
        }

        const mainLines = lines.filter(l => !l.match(/^func\s+/) && l !== '}');
        await executeLines(mainLines);

        runtime.running = false;
        document.getElementById('runBtn').style.display = 'inline-block';
        document.getElementById('stopBtn').style.display = 'none';
        updateScreenSize();
        setStatus(`Ready | Screen: ${runtime.screenWidth}x${runtime.screenHeight} (${runtime.currentScale}x)`);
    }

    function stopScript() {
        runtime.stopFlag = true;
        runtime.running = false;
        appendConsole("⚠ Script stopped by user", "#ffaa00");
        document.getElementById('runBtn').style.display = 'inline-block';
        document.getElementById('stopBtn').style.display = 'none';
        setStatus("Stopped | REPL Mode Active");
    }

    document.getElementById('term-input').addEventListener('keydown', async (e) => {
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (runtime.commandHistory.length > 0 && runtime.historyIndex < runtime.commandHistory.length - 1) {
                runtime.historyIndex++;
                e.target.value = runtime.commandHistory[runtime.commandHistory.length - 1 - runtime.historyIndex];
            }
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (runtime.historyIndex > 0) {
                runtime.historyIndex--;
                e.target.value = runtime.commandHistory[runtime.commandHistory.length - 1 - runtime.historyIndex];
            } else {
                runtime.historyIndex = -1;
                e.target.value = '';
            }
        }
    });

    document.getElementById('term-input').addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && !runtime.running) {
            const input = e.target.value.trim();
            if (!input) return;

            e.target.value = '';
            runtime.commandHistory.push(input);
            runtime.historyIndex = -1;

            appendConsole('> ' + input, "#58a6ff");
            
            const lines = input.split('\n').map(l => l.trim()).filter(l => l);
            await executeLines(lines);
        }
    });

## 📘 概要

---

## 🎨 ビットマップ文字システム

### bitmap.define
4x8ピクセルのカスタム文字を定義

**1bit (モノクロ)**
\`\`\`ezs
bitmap.define "heart" "0110,1111,1111,0110,0110,0100,0000,0000" 1bit

\`\`\`ezs

\`\`\`

### bitmap.print
定義した文字を出力
\`\`\`ezs
bitmap.print "heart"
\`\`\`
