<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shader Studio Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    :root {
      --bg: #f0f2f5;
      --bg-panel: rgba(255, 255, 255, 0.92);
      --bg-hover: rgba(0, 0, 0, 0.05);
      --bg-active: rgba(0, 0, 0, 0.08);
      --fg: #1f2937;
      --fg-muted: #6b7280;
      --accent: #2563eb;
      --accent-light: #3b82f6;
      --border: rgba(0,0,0,0.08);
      --x-color: #dc2626;
      --y-color: #16a34a;
      --z-color: #2563eb;
      --danger: #ef4444;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Inter', 'Noto Sans JP', 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
    }
    
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 2px; }
    
    #viewport { position: fixed; inset: 0; z-index: 1; }
    #canvas { width: 100%; height: 100%; display: block; }
    
    .panel {
      position: fixed;
      width: 280px;
      background: var(--bg-panel);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 12px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 50;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), top 0.3s, bottom 0.3s;
      max-height: calc(100vh - 32px);
      max-height: calc(100dvh - 32px);
      overflow: hidden;
    }
    
    .panel-header {
      padding: 12px 16px;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.5px;
      color: var(--fg-muted);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    
    .btn {
      background: var(--bg-active);
      border: none;
      color: var(--fg);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .btn:hover { background: var(--bg-hover); }
    .btn:active { transform: scale(0.97); }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: var(--accent-light); }
    .btn-icon { width: 28px; height: 28px; padding: 0; }
    
    .input-group { display: flex; gap: 4px; margin-bottom: 6px; }
    
    .input-field {
      background: rgba(0,0,0,0.04);
      border: none;
      color: var(--fg);
      padding: 6px 8px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      width: 100%;
      transition: background 0.15s;
    }
    .input-field:focus { outline: none; background: rgba(0,0,0,0.06); }
    
    input[type="color"] {
      -webkit-appearance: none;
      width: 28px; height: 28px;
      border: none; border-radius: 6px;
      cursor: pointer; background: transparent;
      padding: 2px;
    }
    input[type="color"]::-webkit-color-swatch { border-radius: 4px; border: none; }
    
    input[type="range"] {
      -webkit-appearance: none;
      background: rgba(0,0,0,0.08);
      border-radius: 3px;
      height: 3px;
      flex: 1;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }
    
    .section {
      background: rgba(0,0,0,0.02);
      border-radius: 8px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .section-header {
      padding: 8px 10px;
      font-size: 10px;
      font-weight: 600;
      color: var(--fg-muted);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section-header:hover { background: var(--bg-hover); }
    .section.collapsed .section-content { display: none; }
    
    .axis-input { position: relative; flex: 1; }
    .axis-input::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 14px; height: 2px;
      border-radius: 1px;
    }
    .axis-x::after { background: var(--x-color); }
    .axis-y::after { background: var(--y-color); }
    .axis-z::after { background: var(--z-color); }
    
    .dropdown-layer {
      position: fixed;
      inset: 0;
      z-index: 1000;
      pointer-events: none;
      display: none;
    }
    .dropdown-layer.active { display: block; pointer-events: auto; }
    
    .dropdown-menu {
      position: fixed;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      min-width: 160px;
      padding: 4px;
      z-index: 1001;
    }
    
    .dropdown-item {
      padding: 8px 10px;
      font-size: 12px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dropdown-item:hover { background: var(--bg-hover); }
    .dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }
    
    .object-item {
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
      font-size: 12px;
    }
    .object-item:hover { background: var(--bg-hover); }
    .object-item.selected { background: rgba(37, 99, 235, 0.15); }
    
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.visible { opacity: 1; pointer-events: auto; }
    
    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 280px;
      text-align: center;
    }
    
    .status-bar {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 14px;
      background: var(--bg-panel);
      backdrop-filter: blur(20px);
      border-radius: 8px;
      font-size: 11px;
      z-index: 50;
      display: flex;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--border);
    }
    
    .transform-hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 8px 16px;
      background: var(--accent);
      color: white;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 100;
    }
    .transform-hint.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="viewport"><canvas id="canvas"></canvas></div>

  <!-- Left Panel -->
  <div class="panel" id="leftPanel" style="left: 10px; top: 10px;">
    <div class="panel-header">
      <span data-i18n="scene">Scene</span>
      <button class="btn btn-icon" onclick="togglePanelPosition('left')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
      </button>
    </div>
    <div class="panel-content">
      <div class="input-group">
        <button class="btn btn-accent" style="flex:1" onclick="showAddMenu(event)" data-i18n="add">Add</button>
        <button class="btn" onclick="undo()" title="Undo (Ctrl+Z)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h10a5 5 0 0 1 5 5v2M3 10l4-4m-4 4l4 4"/></svg></button>
        <button class="btn" onclick="redo()" title="Redo (Ctrl+Y)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10H11a5 5 0 0 0-5 5v2m15-7l-4-4m4 4l-4 4"/></svg></button>
      </div>
      <div id="objectList"></div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="panel" id="rightPanel" style="right: 10px; top: 10px;">
    <div class="panel-header">
      <span data-i18n="properties">Properties</span>
      <button class="btn btn-icon" onclick="togglePanelPosition('right')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
      </button>
    </div>
    <div class="panel-content" id="propertiesPanel"></div>
  </div>

  <!-- Toolbar -->
  <div class="status-bar" style="top: 10px; bottom: auto;">
    <button class="btn btn-icon active" id="btnTranslate" onclick="setMode('translate')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
    </button>
    <button class="btn btn-icon" id="btnRotate" onclick="setMode('rotate')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
    </button>
    <button class="btn btn-icon" id="btnScale" onclick="setMode('scale')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 3H3v18h18V3z"/><path d="M15 3v6h6M3 15h6v6"/></svg>
    </button>
    <div style="width:1px; height:16px; background:var(--border); margin: 0 4px;"></div>
    <button class="btn" id="btnDraw" onclick="toggleDrawMode()" data-i18n="draw">Draw</button>
    <select class="input-field" style="width:70px" id="langSelect" onchange="changeLanguage(this.value)">
      <option value="ja">日本語</option>
      <option value="en">English</option>
      <option value="zh">中文</option>
    </select>
    <div style="flex:1"></div>
    <button class="btn" onclick="saveProject()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg></button>
    <button class="btn btn-accent" onclick="renderImage()" data-i18n="render">Render</button>
  </div>

  <!-- Bottom Status -->
  <div class="status-bar">
    <span id="statusText">Ready</span>
    <span class="mono" id="objectCount">0 objs</span>
  </div>

  <!-- Dropdown Layer -->
  <div class="dropdown-layer" id="dropdownLayer">
    <div class="dropdown-menu" id="dropdownMenu" style="display:none;"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <div id="modalTitle" style="font-weight:600; margin-bottom:8px;"></div>
      <div id="modalBody" style="color:var(--fg-muted); margin-bottom:16px; font-size:13px;"></div>
      <div style="display:flex; gap:8px; justify-content:center;">
        <button class="btn" onclick="closeModal()" data-i18n="cancel">Cancel</button>
        <button class="btn" id="modalConfirm" style="background:var(--danger); color:white;" onclick="modalAction()"></button>
      </div>
    </div>
  </div>

  <!-- Transform Hint -->
  <div class="transform-hint" id="transformHint"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';
import { FontLoader } from 'three/addons/loaders/FontLoader.js';
import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

// === Localization ===
const i18n = {
  ja: {
    scene: "シーン", add: "追加", properties: "プロパティ", draw: "描画", render: "レンダリング",
    cancel: "キャンセル", delete: "削除", confirm: "確認", save: "保存", load: "読込",
    box: "四角", roundedBox: "角丸四角", sphere: "球", cylinder: "円柱", plane: "平面", text: "テキスト", bezier: "ベジェ", metaball: "メタボール",
    ambient: "環境光", point: "ポイントライト", directional: "太陽光", spot: "スポットライト", camera: "カメラ",
    transform: "トランスフォーム", position: "位置", rotation: "回転", scale: "スケール",
    material: "マテリアル", color: "色", type: "タイプ", roughness: "粗さ", metalness: "金属度",
    matte: "マット", metal: "金属", glass: "ガラス", wireframe: "ワイヤー",
    radius: "半径", segments: "セグメント", superellipse: "超楕円指数", 
    intensity: "強度", angle: "角度",
    textContent: "テキスト内容", font: "フォント", size: "サイズ",
    brushType: "ブラシタイプ", thickness: "太さ", round: "丸", square: "四角", triangle: "三角",
    deleteConfirm: "このオブジェクトを削除しますか？"
  },
  en: {
    scene: "Scene", add: "Add", properties: "Properties", draw: "Draw", render: "Render",
    cancel: "Cancel", delete: "Delete", confirm: "Confirm", save: "Save", load: "Load",
    box: "Box", roundedBox: "Rounded Box", sphere: "Sphere", cylinder: "Cylinder", plane: "Plane", text: "Text", bezier: "Bezier", metaball: "Metaball",
    ambient: "Ambient", point: "Point", directional: "Sun", spot: "Spot", camera: "Camera",
    transform: "Transform", position: "Position", rotation: "Rotation", scale: "Scale",
    material: "Material", color: "Color", type: "Type", roughness: "Roughness", metalness: "Metalness",
    matte: "Matte", metal: "Metal", glass: "Glass", wireframe: "Wireframe",
    radius: "Radius", segments: "Segments", superellipse: "Superellipse",
    intensity: "Intensity", angle: "Angle",
    textContent: "Text Content", font: "Font", size: "Size",
    brushType: "Brush Type", thickness: "Thickness", round: "Round", square: "Square", triangle: "Triangle",
    deleteConfirm: "Delete this object?"
  },
  zh: {
    scene: "场景", add: "添加", properties: "属性", draw: "绘制", render: "渲染",
    cancel: "取消", delete: "删除", confirm: "确认", save: "保存", load: "加载",
    box: "立方体", roundedBox: "圆角立方体", sphere: "球体", cylinder: "圆柱体", plane: "平面", text: "文本", bezier: "贝塞尔", metaball: "元球",
    ambient: "环境光", point: "点光源", directional: "太阳光", spot: "聚光灯", camera: "相机",
    transform: "变换", position: "位置", rotation: "旋转", scale: "缩放",
    material: "材质", color: "颜色", type: "类型", roughness: "粗糙度", metalness: "金属度",
    matte: "哑光", metal: "金属", glass: "玻璃", wireframe: "线框",
    radius: "半径", segments: "分段", superellipse: "超椭圆指数",
    intensity: "强度", angle: "角度",
    textContent: "文本内容", font: "字体", size: "尺寸",
    brushType: "画笔类型", thickness: "厚度", round: "圆", square: "方", triangle: "三角",
    deleteConfirm: "确定删除此对象？"
  }
};
let currentLang = 'ja';

function t(key) { return i18n[currentLang][key] || key; }
window.t = t;

// === State Management ===
let scene, camera, renderer, controls, tControls;
let objects = [];
let selected = null;
let history = [];
let historyIndex = -1;
const maxHistory = 50;
let fonts = {};
let envMap = null;

// Interaction State
let interactionMode = null; // 'translate', 'rotate', 'scale'
let interactionAxis = null;
let interactionStartMouse = {x:0, y:0};
let interactionStartValue = new THREE.Vector3();
let interactionStartRot = new THREE.Euler();
let interactionStartScale = new THREE.Vector3();
let isDrawing = false;
let drawPoints = [];
let drawMesh = null;

// Modal
let modalCallback = null;

// DB
const DB_NAME = 'ShaderStudioDB';
const STORE_NAME = 'projects';

function initDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, 1);
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'name' });
      }
    };
  });
}

// === Three.js Setup ===
function init() {
  const canvas = document.getElementById('canvas');
  
  // Scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf0f2f5);
  
  // Camera
  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(8, 6, 8);
  
  // Renderer
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  
  // Controls
  controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  
  tControls = new TransformControls(camera, canvas);
  tControls.addEventListener('dragging-changed', (e) => {
    controls.enabled = !e.value;
    if (!e.value) pushHistory();
  });
  tControls.addEventListener('objectChange', updateUI);
  scene.add(tControls);
  
  // Lights
  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);
  
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(10, 20, 10);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(2048, 2048);
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 50;
  dirLight.shadow.camera.left = -15;
  dirLight.shadow.camera.right = 15;
  dirLight.shadow.camera.top = 15;
  dirLight.shadow.camera.bottom = -15;
  scene.add(dirLight);
  
  // Grid
  const grid = new THREE.GridHelper(30, 30, 0xcccccc, 0xe0e0e0);
  scene.add(grid);
  
  // Environment
  createEnvMap();
  
  // Load Fonts
  const loader = new FontLoader();
  const fontUrl = 'https://unpkg.com/three@0.160.0/examples/fonts/';
  loader.load(fontUrl + 'helvetiker_regular.typeface.json', f => fonts.regular = f);
  loader.load(fontUrl + 'helvetiker_bold.typeface.json', f => fonts.bold = f);
  
  // Events
  window.addEventListener('resize', onResize);
  canvas.addEventListener('pointerdown', onPointerDown);
  canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('pointerup', onPointerUp);
  document.addEventListener('keydown', onKeyDown);
  document.addEventListener('keyup', onKeyUp);
  
  // Dropdown Layer
  document.getElementById('dropdownLayer').addEventListener('click', closeDropdown);
  
  // Init IndexedDB
  initDB();
  
  pushHistory();
  animate();
}

function createEnvMap() {
  const pmrem = new THREE.PMREMGenerator(renderer);
  const envScene = new THREE.Scene();
  const envGeom = new THREE.SphereGeometry(100, 16, 16);
  const envMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: { top: { value: new THREE.Color(0x88aacc) }, bottom: { value: new THREE.Color(0x333344) } },
    vertexShader: 'varying vec3 vPos; void main() { vPos = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }',
    fragmentShader: 'uniform vec3 top; uniform vec3 bottom; varying vec3 vPos; void main() { float h = normalize(vPos).y; gl_FragColor = vec4(mix(bottom, top, h*0.5+0.5), 1.0); }'
  });
  envScene.add(new THREE.Mesh(envGeom, envMat));
  envMap = pmrem.fromScene(envScene, 0.04).texture;
  scene.environment = envMap;
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// === Object Creation ===
function createObject(type, params = {}) {
  let mesh;
  const color = params.color || '#3b82f6';
  const isPlane = type === 'plane';
  
  const mat = new THREE.MeshPhysicalMaterial({
    color: new THREE.Color(color),
    metalness: type === 'metal' ? 1 : 0,
    roughness: type === 'metal' ? 0.15 : 0.6,
    transmission: type === 'glass' ? 0.95 : 0,
    transparent: type === 'glass',
    thickness: 0.5,
    side: isPlane ? THREE.DoubleSide : THREE.FrontSide,
    wireframe: params.wireframe || false
  });
  
  switch(type) {
    case 'box':
      mesh = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), mat);
      break;
    case 'roundedBox':
      mesh = new THREE.Mesh(new RoundedBoxGeometry(1,1,1, params.segments || 4, params.radius || 0.08), mat);
      break;
    case 'sphere':
      mesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), mat);
      break;
    case 'cylinder':
      mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1, 32), mat);
      break;
    case 'plane':
      mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mat);
      mesh.rotation.x = -Math.PI / 2;
      break;
    case 'text':
      const font = fonts[params.fontStyle || 'regular'];
      if (font) {
        const geo = new TextGeometry(params.text || 'Text', { font, size: 0.5, height: 0.1 });
        geo.computeBoundingBox();
        mesh = new THREE.Mesh(geo, mat);
      } else {
        mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 0.2, 0.5), mat);
      }
      break;
    case 'bezier':
      const curve = new THREE.CubicBezierCurve3(
        new THREE.Vector3(-1, 0, 0),
        new THREE.Vector3(-0.5, 1, 0),
        new THREE.Vector3(0.5, 1, 0),
        new THREE.Vector3(1, 0, 0)
      );
      const points = curve.getPoints(50);
      const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
      const lineMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
      mesh = new THREE.Line(lineGeo, lineMat);
      mesh.userData.controlPoints = curve.points.map(p => p.clone());
      mesh.userData.isCurve = true;
      break;
    default:
      mesh = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), mat);
  }
  
  mesh.castShadow = !isPlane;
  mesh.receiveShadow = true;
  
  const objData = {
    id: Date.now(),
    name: `${t(type)}_${objects.length + 1}`,
    type: type,
    mesh: mesh,
    color: color,
    params: { radius: 0.08, segments: 4, superellipse: 1, text: 'Text', fontStyle: 'regular', ...params },
    isLight: false
  };
  
  mesh.userData.objectId = objData.id;
  scene.add(mesh);
  objects.push(objData);
  
  if (type === 'bezier') {
    createBezierHandles(objData);
  }
  
  select(objData);
  pushHistory();
  updateObjectList();
  return objData;
}

function createLight(type) {
  let light, helper;
  const color = '#ffffff';
  
  switch(type) {
    case 'ambient':
      light = new THREE.AmbientLight(color, 0.4);
      break;
    case 'point':
      light = new THREE.PointLight(color, 30);
      light.position.set(2, 3, 2);
      light.castShadow = true;
      helper = new THREE.PointLightHelper(light, 0.2);
      scene.add(helper);
      break;
    case 'directional':
      light = new THREE.DirectionalLight(color, 1.2);
      light.position.set(5, 10, 5);
      light.castShadow = true;
      helper = new THREE.DirectionalLightHelper(light, 0.5);
      scene.add(helper);
      break;
    case 'spot':
      light = new THREE.SpotLight(color, 50);
      light.position.set(0, 5, 0);
      light.angle = Math.PI / 6;
      light.castShadow = true;
      helper = new THREE.SpotLightHelper(light);
      scene.add(helper);
      break;
  }
  
  const objData = {
    id: Date.now(),
    name: `${t(type)}_${objects.length + 1}`,
    type: type + 'Light',
    mesh: light,
    helper: helper,
    color: color,
    intensity: light.intensity,
    isLight: true
  };
  
  light.userData.objectId = objData.id;
  scene.add(light);
  objects.push(objData);
  
  if (type !== 'ambient') select(objData);
  else updateObjectList();
  pushHistory();
}

// === Bezier Handles ===
function createBezierHandles(obj) {
  if (!obj.mesh.userData.controlPoints) return;
  
  const handleGroup = new THREE.Group();
  obj.mesh.userData.handles = handleGroup;
  
  obj.mesh.userData.controlPoints.forEach((p, i) => {
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.1, 16, 16),
      new THREE.MeshBasicMaterial({ color: i === 0 || i === 3 ? 0xff0000 : 0x00ff00 })
    );
    sphere.position.copy(p);
    sphere.userData.handleIndex = i;
    sphere.userData.parentId = obj.id;
    handleGroup.add(sphere);
  });
  scene.add(handleGroup);
}

function updateBezierCurve(obj) {
  if (!obj.mesh.userData.controlPoints) return;
  const points = obj.mesh.userData.controlPoints;
  const curve = new THREE.CubicBezierCurve3(points[0], points[1], points[2], points[3]);
  const pts = curve.getPoints(50);
  obj.mesh.geometry.setFromPoints(pts);
  
  if (obj.mesh.userData.handles) {
    obj.mesh.userData.handles.children.forEach((h, i) => {
      h.position.copy(points[i]);
    });
  }
}

// === History (Undo/Redo) ===
function pushHistory() {
  // Trim future history if we're in the middle
  if (historyIndex < history.length - 1) {
    history = history.slice(0, historyIndex + 1);
  }
  
  const state = objects.map(o => ({
    id: o.id,
    name: o.name,
    type: o.type,
    isLight: o.isLight,
    color: o.color,
    intensity: o.intensity,
    params: JSON.parse(JSON.stringify(o.params)),
    pos: o.mesh.position.toArray(),
    rot: o.mesh.rotation.toArray(),
    scale: o.mesh.scale.toArray(),
    controlPoints: o.mesh.userData.controlPoints ? o.mesh.userData.controlPoints.map(p => p.toArray()) : null
  }));
  
  history.push(JSON.stringify(state));
  if (history.length > maxHistory) history.shift();
  historyIndex = history.length - 1;
}

window.undo = function() {
  if (historyIndex > 0) {
    historyIndex--;
    restoreState(JSON.parse(history[historyIndex]));
  }
};

window.redo = function() {
  if (historyIndex < history.length - 1) {
    historyIndex++;
    restoreState(JSON.parse(history[historyIndex]));
  }
};

function restoreState(state) {
  // Clear current
  objects.forEach(o => {
    scene.remove(o.mesh);
    if (o.helper) scene.remove(o.helper);
    if (o.mesh.userData.handles) scene.remove(o.mesh.userData.handles);
  });
  objects = [];
  tControls.detach();
  selected = null;
  
  // Restore
  state.forEach(s => {
    const o = {
      id: s.id,
      name: s.name,
      type: s.type,
      isLight: s.isLight,
      color: s.color,
      intensity: s.intensity,
      params: s.params || {},
      mesh: null
    };
    
    if (o.isLight) {
      // Recreate light
      const lType = s.type.replace('Light', '');
      createLight(lType);
      const newObj = objects[objects.length - 1];
      newObj.id = s.id;
      newObj.name = s.name;
      newObj.color = s.color;
      newObj.mesh.intensity = s.intensity;
      newObj.mesh.color.set(s.color);
      newObj.mesh.position.fromArray(s.pos);
    } else {
      createObject(s.type, {...s.params, color: s.color});
      const newObj = objects[objects.length - 1];
      newObj.id = s.id;
      newObj.name = s.name;
      newObj.mesh.position.fromArray(s.pos);
      newObj.mesh.rotation.fromArray(s.rot);
      newObj.mesh.scale.fromArray(s.scale);
      if (s.controlPoints) {
        newObj.mesh.userData.controlPoints = s.controlPoints.map(a => new THREE.Vector3().fromArray(a));
        updateBezierCurve(newObj);
      }
    }
  });
  
  updateObjectList();
  updateUI();
}

// === Selection ===
function select(obj) {
  selected = obj;
  if (obj && !obj.isLight || (obj && obj.type !== 'ambientLight')) {
    tControls.attach(obj.mesh);
  } else {
    tControls.detach();
  }
  updateObjectList();
  updateUI();
}

function deselect() {
  selected = null;
  tControls.detach();
  updateObjectList();
  updateUI();
}

// === UI Updates ===
function updateObjectList() {
  const list = document.getElementById('objectList');
  list.innerHTML = '';
  
  objects.forEach(o => {
    const div = document.createElement('div');
    div.className = 'object-item' + (selected && selected.id === o.id ? ' selected' : '');
    div.innerHTML = `<span>${o.name}</span>`;
    div.onclick = () => select(o);
    list.appendChild(div);
  });
  
  document.getElementById('objectCount').textContent = `${objects.length} ${t('objects') || 'objs'}`;
}

function updateUI() {
  updateObjectList();
  updateProperties();
}

// === Property Updaters (Real-time) ===
window.updatePos = (i, v) => { if(selected) { selected.mesh.position.setComponent(i, parseFloat(v)); pushHistory(); }};
window.updateRot = (i, v) => { if(selected) { selected.mesh.rotation.setComponent(i, THREE.MathUtils.degToRad(parseFloat(v))); pushHistory(); }};
window.updateScale = (i, v) => { if(selected) { selected.mesh.scale.setComponent(i, Math.max(0.1, parseFloat(v))); pushHistory(); }};
window.updateColor = (v) => { if(selected && selected.mesh.material) { selected.color = v; selected.mesh.material.color.set(v); pushHistory(); }};
window.updateRough = (v) => { if(selected && selected.mesh.material) { selected.mesh.material.roughness = parseFloat(v); pushHistory(); }};
window.toggleWireframe = (v) => { if(selected && selected.mesh.material) { selected.mesh.material.wireframe = v; pushHistory(); }};
window.updateMatType = (v) => { 
  if(selected && selected.mesh.material) { 
    selected.params.matType = v;
    const m = selected.mesh.material;
    if (v === 'glass') {
      m.transmission = 0.95; m.transparent = true; m.metalness = 0; m.roughness = 0.05;
    } else if (v === 'metal') {
      m.transmission = 0; m.transparent = false; m.metalness = 1; m.roughness = 0.15;
    } else {
      m.transmission = 0; m.transparent = false; m.metalness = 0; m.roughness = 0.6;
    }
    pushHistory();
  }
};
window.updateRadius = (v) => { if(selected && selected.type==='roundedBox') { selected.params.radius = parseFloat(v); rebuildRoundedBox(); pushHistory(); }};
window.updateSegments = (v) => { if(selected && selected.type==='roundedBox') { selected.params.segments = parseInt(v); rebuildRoundedBox(); pushHistory(); }};
window.updateText = (v) => { if(selected && selected.type==='text') { selected.params.text = v; rebuildText(); pushHistory(); }};
window.updateFont = (v) => { if(selected && selected.type==='text') { selected.params.fontStyle = v; rebuildText(); pushHistory(); }};
window.updateLightColor = (v) => { if(selected && selected.isLight) { selected.color = v; selected.mesh.color.set(v); pushHistory(); }};
window.updateLightIntensity = (v) => { if(selected && selected.isLight) { selected.intensity = parseFloat(v); selected.mesh.intensity = parseFloat(v); pushHistory(); }};

function rebuildRoundedBox() {
  const o = selected;
  const oldGeo = o.mesh.geometry;
  o.mesh.geometry = new RoundedBoxGeometry(1, 1, 1, o.params.segments, o.params.radius);
  oldGeo.dispose();
}

function rebuildText() {
  const o = selected;
  const font = fonts[o.params.fontStyle || 'regular'];
  if (!font) return;
  const oldGeo = o.mesh.geometry;
  o.mesh.geometry = new TextGeometry(o.params.text, { font, size: 0.5, height: 0.1 });
  oldGeo.dispose();
}

// === Modals ===
window.confirmDelete = function() {
  showConfirmModal(t('deleteConfirm'), t('delete'), () => {
    deleteSelected();
  });
}

window.showConfirmModal = function(msg, btnText, cb) {
  document.getElementById('modalTitle').textContent = t('confirm');
  document.getElementById('modalBody').textContent = msg;
  document.getElementById('modalConfirm').textContent = btnText;
  document.getElementById('modalOverlay').classList.add('visible');
  modalCallback = cb;
}

window.closeModal = function() {
  document.getElementById('modalOverlay').classList.remove('visible');
  modalCallback = null;
}

window.modalAction = function() {
  if (modalCallback) modalCallback();
  closeModal();
}

function deleteSelected() {
  if (!selected) return;
  const idx = objects.findIndex(o => o.id === selected.id);
  if (idx > -1) {
    const o = objects[idx];
    scene.remove(o.mesh);
    if (o.helper) scene.remove(o.helper);
    if (o.mesh.userData.handles) scene.remove(o.mesh.userData.handles);
    objects.splice(idx, 1);
    tControls.detach();
    selected = null;
    pushHistory();
    updateUI();
  }
}

// === Interaction (Blender Style) ===
function setMode(mode) {
  document.getElementById('btnTranslate').classList.remove('active');
  document.getElementById('btnRotate').classList.remove('active');
  document.getElementById('btnScale').classList.remove('active');
  document.getElementById(`btn${mode.charAt(0).toUpperCase() + mode.slice(1)}`).classList.add('active');
  if(tControls) tControls.setMode(mode);
}

window.setMode = setMode;

function onKeyDown(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  
  const key = e.key.toLowerCase();
  
  if (key === 'g') startInteraction('translate');
  if (key === 'r') startInteraction('rotate');
  if (key === 's') startInteraction('scale');
  if (key === 'x' && interactionMode) setInteractionAxis('x');
  if (key === 'y' && interactionMode) setInteractionAxis('y');
  if (key === 'z' && interactionMode) setInteractionAxis('z');
  if (key === 'escape') cancelInteraction();
  if (key === 'delete') confirmDelete();
  
  if (e.ctrlKey || e.metaKey) {
    if (key === 'z') { e.preventDefault(); undo(); }
    if (key === 'y') { e.preventDefault(); redo(); }
    if (key === 's') { e.preventDefault(); saveProject(); }
  }
}

function onKeyUp(e) {
  
}

function startInteraction(mode) {
  if (!selected || selected.isLight && selected.type === 'ambientLight') return;
  interactionMode = mode;
  interactionAxis = null;
  interactionStartMouse = { x: event.clientX, y: event.clientY };
  
  if (mode === 'translate') interactionStartValue.copy(selected.mesh.position);
  if (mode === 'rotate') interactionStartRot.copy(selected.mesh.rotation);
  if (mode === 'scale') interactionStartScale.copy(selected.mesh.scale);
  
  controls.enabled = false;
  tControls.enabled = false;
  showHint(mode);
}

function setInteractionAxis(axis) {
  interactionAxis = axis;
  showHint(`${interactionMode} ${axis.toUpperCase()}`);
}

function onPointerMove(e) {
  if (interactionMode && selected) {
    const dx = (e.clientX - interactionStartMouse.x) * 0.01;
    const dy = (e.clientY - interactionStartMouse.y) * 0.01;
    
    const m = selected.mesh;
    
    if (interactionMode === 'translate') {
      m.position.copy(interactionStartValue);
      if (interactionAxis === 'x') m.position.x += dx;
      else if (interactionAxis === 'y') m.position.y -= dy;
      else if (interactionAxis === 'z') m.position.z += dx; // Approx
      else { m.position.x += dx; m.position.y -= dy; }
    }
    // Rotate & Scale logic similar...
    updateUI();
  }
  
  // Drawing
  if (isDrawing && drawMesh) {
    const rect = renderer.domElement.getBoundingClientRect();
    const mouse = new THREE.Vector2(
      ((e.clientX - rect.left) / rect.width) * 2 - 1,
      -((e.clientY - rect.top) / rect.height) * 2 + 1
    );
    
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    
    // Cast to plane
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -0.5); // Simple plane at y=0.5
    const point = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, point);
    
    if (point) {
      drawPoints.push(point.clone());
      updateDrawMesh();
    }
  }
}

function onPointerDown(e) {
  // If clicked on empty space
  if (e.target.id === 'canvas' && !interactionMode) {
    const rect = renderer.domElement.getBoundingClientRect();
    const mouse = new THREE.Vector2(
      ((e.clientX - rect.left) / rect.width) * 2 - 1,
      -((e.clientY - rect.top) / rect.height) * 2 + 1
    );
    
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    
    // Check handles first
    const handleMeshes = [];
    objects.forEach(o => {
      if (o.mesh.userData.handles) {
        o.mesh.userData.handles.children.forEach(h => handleMeshes.push(h));
      }
    });
    
    const handleHits = raycaster.intersectObjects(handleMeshes);
    if (handleHits.length > 0) {
      const hit = handleHits[0].object;
      const parentId = hit.userData.parentId;
      const parentObj = objects.find(o => o.id === parentId);
      if (parentObj) {
        select(parentObj);
        // Attach transform to handle logic could go here
        // For simplicity, we just move the handle directly with TransformControls attached to the handle
        tControls.attach(hit);
        tControls.addEventListener('objectChange', () => {
           const idx = hit.userData.handleIndex;
           parentObj.mesh.userData.controlPoints[idx].copy(hit.position);
           updateBezierCurve(parentObj);
        }, { once: false });
      }
      return;
    }
    
    // Check objects
    const meshes = objects.filter(o => !o.isLight || o.type !== 'ambientLight').map(o => o.mesh);
    const hits = raycaster.intersectObjects(meshes, true);
    
    if (hits.length > 0) {
      let hitMesh = hits[0].object;
      // Find parent if needed
      let obj = objects.find(o => o.mesh === hitMesh || (o.mesh.userData.handles && o.mesh.userData.handles.children.includes(hitMesh)));
      if (obj) select(obj);
      else deselect();
    } else {
      // Clicked on background
      if (isDrawing) {
        // Start drawing
        drawPoints = [];
        const mat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        drawMesh = new THREE.Mesh(new THREE.BufferGeometry(), mat);
        scene.add(drawMesh);
      } else {
        deselect();
      }
    }
  }
}

function onPointerUp(e) {
  if (interactionMode) {
    finishInteraction();
  }
  if (isDrawing && drawMesh) {
    // Finish stroke
    // Could convert to permanent object here
  }
}

function finishInteraction() {
  controls.enabled = true;
  tControls.enabled = true;
  interactionMode = null;
  interactionAxis = null;
  hideHint();
  if (selected) tControls.attach(selected.mesh);
  pushHistory();
}

function cancelInteraction() {
  if (interactionMode && selected) {
    selected.mesh.position.copy(interactionStartValue);
    selected.mesh.rotation.copy(interactionStartRot);
    selected.mesh.scale.copy(interactionStartScale);
    finishInteraction();
  }
  closeDropdown();
  closeModal();
}

function showHint(msg) {
  const el = document.getElementById('transformHint');
  el.textContent = msg.toUpperCase();
  el.classList.add('visible');
}

function hideHint() {
  document.getElementById('transformHint').classList.remove('visible');
}

// === Drawing ===
window.toggleDrawMode = function() {
  isDrawing = !isDrawing;
  document.getElementById('btnDraw').classList.toggle('active', isDrawing);
  document.getElementById('statusText').textContent = isDrawing ? 'Drawing Mode' : 'Ready';
}

function updateDrawMesh() {
  if (drawPoints.length < 2) return;
  
  const curve = new THREE.CatmullRomCurve3(drawPoints);
  const tubeGeo = new THREE.TubeGeometry(curve, drawPoints.length * 2, 0.05, 8, false);
  drawMesh.geometry.dispose();
  drawMesh.geometry = tubeGeo;
}

// === File Operations ===
window.saveProject = async function() {
  const state = history[historyIndex];
  const db = await initDB();
  const tx = db.transaction(STORE_NAME, 'readwrite');
  const store = tx.objectStore(STORE_NAME);
  
  const name = `Project_${new Date().toISOString().slice(0,10)}`;
  store.put({ name, data: state });
  
  // Also download
  const blob = new Blob([state], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${name}.json`;
  a.click();
  URL.revokeObjectURL(url);
  
  document.getElementById('statusText').textContent = 'Saved!';
  setTimeout(() => document.getElementById('statusText').textContent = 'Ready', 2000);
}

window.renderImage = function() {
  renderer.render(scene, camera);
  const link = document.createElement('a');
  link.download = 'render.png';
  link.href = renderer.domElement.toDataURL('image/png');
  link.click();
}

// === UI Layout ===
window.togglePanelPosition = function(side) {
  const panel = document.getElementById(`${side}Panel`);
  const isTop = panel.style.top === '10px';
  if (isTop) {
    panel.style.top = 'auto';
    panel.style.bottom = '10px';
  } else {
    panel.style.top = '10px';
    panel.style.bottom = 'auto';
  }
}

// === Language ===
window.changeLanguage = function(lang) {
  currentLang = lang;
  updateObjectList();
  updateProperties();
  // Update static UI elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
}

// Expose functions needed by HTML
window.createObject = createObject;
window.createLight = createLight;

init();
